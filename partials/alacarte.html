        <!-- Page Heading/Breadcrumbs -->
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header">Kinesisk <small>a la carté</small> 
                </h1>
                <ol class="breadcrumb">
                    <li><a href="index.html">Forside</a>
                    </li>
                    <li class="active">Kinesisk a la carté</li>
                </ol>
            </div>
        </div>
        <!-- /.row -->

        <!-- Content Row -->
        <div class="row" ng-repeat="(title, category) in dinners">
            <h2>{{title}}</h2>
            <div ng-repeat="(sub, items) in category">
                <h4 ng-show="sub != ''">{{sub}}</h4>
                <table class="table table-condensed">
                    <thead>
                        <th>Nr.</th><th>Beskrivelse</th><th>Pris</th>
                    </thead>
                    <tr ng-repeat="(key, value) in items">
                        <td style="width:50px">{{key}}</td><td>{{value.description}}</td><td style="width:50px">{{value.price}},-</td>
                    </tr>
                </table>
            </div>
        </div>
        <!-- /.row -->
