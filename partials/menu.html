        <!-- Page Heading/Breadcrumbs -->
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header">SAMMENSATTE MENUER 
                <small>FRA KR. 158,-</small>
                </h1>
                <ol class="breadcrumb">
                    <li><a href="index.html">Forside</a>
                    </li>
                    <li class="active">Menuer</li>
                </ol>
            </div>
        </div>
        <!-- /.row -->

        
        <!-- Content Row -->
        <div class="row">
            <div class="col-md-4" ng-repeat="(key, value) in menus" ng-if="!key.includes('Selskab')">
                <div class="panel panel-default text-center">
                    <div class="panel-heading">
                        <h3 class="panel-title">{{key}}</h3>
                    </div>
                    <div class="panel-body">
                        <span class="price"><sup>kr.</sup> {{value.price}},-</span>
                        <span class="period" ng-if="value.min_buy > 1">Minimum {{value.min_buy}} kuverter</span>
                    </div>                    
                    <div ng-repeat="(title, items) in value" ng-if="!(title == 'price' || title == 'min_buy' || title == 'description')">
                        <h3>{{title}}</h3>
                        <ul class="list-group">
                            <li class="list-group-item" ng-repeat="item in items">{{item}}</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <!-- /.row -->

        <!-- Content Row -->
        <div class="row">
            <h1>SELSKABSMENUER</h1>
            <div class="col-md-6" ng-repeat="(key1, value1) in menus" ng-if="key1.includes('Selskab')">
                <div class="panel panel-default text-center">
                    <div class="panel-heading">
                        <h3 class="panel-title">{{key1}}</h3>
                    </div>
                    <h4>{{value1.description}}</h4>
                    <div class="panel-body">
                        <span class="price"><sup>kr.</sup> {{value1.price}},-</span>
                        <span class="period" ng-if="value1.min_buy > 1">Minimum {{value1.min_buy}} kuverter</span>
                    </div>
                    <div ng-repeat="(title1, items1) in value1" ng-if="!(title1 == 'price' || title1 == 'min_buy' || title == 'description')">
                        <h3>{{title1}}</h3>
                        <ul class="list-group">
                            <li class="list-group-item" ng-repeat="item1 in items1">{{item1}}</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <!-- /.row -->
